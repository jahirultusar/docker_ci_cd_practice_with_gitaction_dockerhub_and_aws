name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/docker_ci_cd_practice:latest
          # This is the magic part: injecting the metadata
          build-args: |
            GIT_HASH=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  deploy:
    needs: build-and-push # The "CD" only starts if the "CI" passes!
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Pull the new image we just pushed
            docker pull ${{ secrets.DOCKER_USERNAME }}/docker_ci_cd_practice:latest
            
            # 2. Stop and remove the old container if it exists
            docker stop flask-app || true
            docker rm flask-app || true
            
            # 3. Run the new version on Port 80
            docker run -d --name flask-app -p 80:5001 ${{ secrets.DOCKER_USERNAME }}/docker_ci_cd_practice:latest
