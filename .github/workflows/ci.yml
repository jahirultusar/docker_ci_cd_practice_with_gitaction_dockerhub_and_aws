name: CI Pipeline

# 1. When should this run?
on:
  push:
    branches: [ "main" ] # Runs every time code pushed to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest # The 'robot' uses a fresh Linux machine

    steps:
      # 2. Pull the code from GitHub onto the robot's machine
      - name: Checkout code
        uses: actions/checkout@v3

      # 3. Log into Docker Hub using the Secrets 
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build the image and Push it to the Hub
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # It's me!
          tags: jahirultusar/docker_ci_cd_practice:latest
