<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Machine{% endblock %}</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">The Machine Control Panel</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}

    <footer class="text-center mt-5 py-3 text-muted">
        <small>Jay's Dockerized & CI/CD Automated</small>
    </footer>
</body>
</html>
